name: CI & Deploy

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# A newer push to main supersedes an in-flight run — never deploy stale code.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # CI — lint + production build. Gates the deploy so broken code never ships.
  # ---------------------------------------------------------------------------
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # Placeholder env vars so `next build` can validate compilation. The real
        # values live in .env.local on the VPS, which rebuilds on deploy.
        # TELEGRAM_BOT_TOKEN must be non-empty: the webhook route constructs the
        # grammy Bot at module scope, which Next evaluates while collecting page
        # data. No network call happens at build time, so a dummy token is safe.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          TELEGRAM_BOT_TOKEN: "123456:ci-placeholder-token"
        run: npm run build

  # ---------------------------------------------------------------------------
  # Deploy — SSH into the VPS and run the same flow you do by hand.
  # ---------------------------------------------------------------------------
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    # Don't deploy on manual CI-only re-runs of other branches; main only.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            # Non-interactive SSH shells skip ~/.bashrc, so nvm's node/npm/pm2
            # aren't on PATH. Load nvm explicitly before anything else.
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use --lts >/dev/null || nvm use node
            cd /var/www/tariff-gift
            git fetch --all
            git reset --hard origin/main
            npm ci
            npm run build
            pm2 restart tariff-gift --update-env
            pm2 save
